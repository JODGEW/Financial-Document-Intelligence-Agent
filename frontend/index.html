<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Document Intelligence Agent</title>
    <script>
      // Resolve the theme before first paint so there is no light-mode flash
      // on a dark preference. A stored light/dark choice forces the matching
      // class; auto (or nothing stored) leaves both classes off so the
      // prefers-color-scheme CSS follows the OS live.
      (function () {
        try {
          var stored = localStorage.getItem("fdia-theme");
          if (stored === "dark" || stored === "light") {
            document.documentElement.classList.add(stored);
          }
        } catch (e) {
          // Storage unavailable: stay in auto and follow the OS.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
